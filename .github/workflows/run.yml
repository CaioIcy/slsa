on:
  schedule:
    - cron: "48 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest

    permissions:
      contents: write # git push to main + gh-pages deploy

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # bin/ci.sh needs a commit older than 72h to build data/slippi-old.json.
          # Worst case observed is 35 commits in any 72h window; 100 leaves headroom.
          fetch-depth: 100

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json # engines.node

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # version comes from package.json's `packageManager` field
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]
            - args: [--global, --allow-build=esbuild, vite-node]

      - name: Run CI
        run: bin/ci.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
